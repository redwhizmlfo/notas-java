name: Integracion Continua - CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Crear carpeta de salida
        run: mkdir -p out

      - name: Compilar programa y pruebas
        run: javac -d out src/Main.java test/MainTest.java

      - name: Ejecutar pruebas con assert habilitado
        run: java -ea -cp out MainTest
