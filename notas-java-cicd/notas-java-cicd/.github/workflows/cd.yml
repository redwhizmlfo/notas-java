name: Despliegue Continuo - CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar version de produccion
        run: javac -d out src/Main.java

      - name: Empaquetar artefacto
        run: jar --create --file notas-java.jar -C out .

      - name: Publicar artefacto de produccion
        uses: actions/upload-artifact@v4
        with:
          name: notas-java-produccion
          path: notas-java.jar
